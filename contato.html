<section>
<h2>Solicite um Orçamento</h2>

<form id="formContato">
<input type="text" id="nome" placeholder="Seu Nome" required>
<input type="text" id="empresa" placeholder="Empresa">
<textarea id="mensagem" placeholder="Descreva seu pedido..." required></textarea>
<button type="submit">Enviar Pedido</button>
</form>

</section>

<script src="js/menu.js"></script>

<script>
document.getElementById('formContato').addEventListener('submit', function(e){
e.preventDefault();

let nome = document.getElementById('nome').value;
let empresa = document.getElementById('empresa').value;
let mensagem = document.getElementById('mensagem').value;

let texto = `Olá, meu nome é ${nome}%0AEmpresa: ${empresa}%0A%0APedido:%0A${mensagem}`;

window.open(`https://api.whatsapp.com/send?phone=5519992247044&text=${texto}`, '_blank');
});
</script>
